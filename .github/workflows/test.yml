name: Test

on:
  pull_request:
  push:
    branches: [master]

env:
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    name: Lint + Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/unit

  contract:
    name: Contract tests (atlas drift)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contract

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
        working-directory: packages/db
      # Testcontainers picks up Docker from the GH runner natively.
      - run: pnpm test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage/integration

  security:
    name: Security tests
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
        working-directory: packages/db
      - run: pnpm test:security
        continue-on-error: true # tighten once suite is fully populated

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
        working-directory: packages/db
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: |
            coverage/playwright-report
            test-results

  atlas-drift:
    name: Atlas drift guard
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm atlas:gen
      - run: git diff --exit-code docs/atlas/_generated/

  migration-safety:
    name: Migration safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmr_migrate_check
        ports: ['5432:5432']
        options: --health-cmd=pg_isready --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmr_migrate_check
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tmr/db exec prisma migrate deploy
      - run: pnpm --filter @tmr/db exec prisma db push --skip-generate --accept-data-loss
      # If db push reports changes after migrate deploy, it means migrations are
      # incomplete vs schema.prisma.
      - run: |
          if pnpm --filter @tmr/db exec prisma db push --skip-generate 2>&1 | grep -q "drift"; then
            echo "Schema drift detected — migrations are out of sync with schema.prisma"
            exit 1
          fi

  coverage-gate:
    name: Coverage threshold
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: coverage-unit, path: coverage/unit }
      - uses: actions/download-artifact@v4
        with: { name: coverage-integration, path: coverage/integration }
      - name: Verify lines coverage ≥ 60%
        run: |
          set -e
          if [ -f coverage/unit/coverage-summary.json ]; then
            LINES=$(jq -r '.total.lines.pct' coverage/unit/coverage-summary.json)
            echo "Unit line coverage: $LINES%"
            awk -v v="$LINES" 'BEGIN { if (v+0 < 60) exit 1 }'
          else
            echo "No coverage summary — skipping threshold (initial bootstrap phase)"
          fi
